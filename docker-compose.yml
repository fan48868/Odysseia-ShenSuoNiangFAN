x-app-base: &app_base
  env_file:
    - .env
  environment:
    - RUNNING_IN_DOCKER=true
    - DB_HOST=db
    - DB_PORT=5432
  build:
    context: .
    dockerfile: .devcontainer/Dockerfile
  image: odysseia-guidance-app:latest
  volumes:
    - .:/app
  networks:
    - bot_network

services:
  bot_app:
    <<: *app_base
    restart: unless-stopped
    mem_limit: 1g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: Odysseia_Guidance
    environment:
      RUNNING_IN_DOCKER: true
      DB_HOST: db
      DB_PORT: 5432
      WEBUI_LOG_SERVER_URL: "http://config_web:80/api/log"
      http_proxy: ${CONTAINER_HTTP_PROXY:-http://host.docker.internal:7890}
      https_proxy: ${CONTAINER_HTTPS_PROXY:-http://host.docker.internal:7890}
      HTTP_PROXY: ${CONTAINER_HTTP_PROXY:-http://host.docker.internal:7890}
      HTTPS_PROXY: ${CONTAINER_HTTPS_PROXY:-http://host.docker.internal:7890}
      NO_PROXY: ${CONTAINER_NO_PROXY:-localhost,127.0.0.1,db,config_web}
      no_proxy: ${CONTAINER_NO_PROXY:-localhost,127.0.0.1,db,config_web}
    volumes:
      - .:/app
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    # For container debugging, replace this with: sleep infinity
    command: python3 -u -m src.main
    depends_on:
      db:
        condition: service_healthy
      db_migrate:
        condition: service_completed_successfully

  db_migrate:
    <<: *app_base
    restart: "no"
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  config_web:
    <<: *app_base
    container_name: config_web
    restart: unless-stopped
    ports:
      - "${CONFIG_WEB_PORT:-8080}:80"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock

    command: gunicorn --chdir ./web -k uvicorn.workers.UvicornWorker -w 1 --bind 0.0.0.0:80 "web_main:web_app"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: paradedb/paradedb@sha256:23079f9f0a2dbb427e413179a056a93cb892e9b6d3627dad82c12cedd22be39e
    container_name: odysseia_pg_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odysseia_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge
    
